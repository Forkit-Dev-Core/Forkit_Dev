# Example AgentPassport config — use with:
#   forkit register agent register_agent.yaml

name: demo-support-agent
version: 2.0.0
description: Demo multilingual support assistant for public Forkit Core examples
role: assistant

# Must match a registered ModelPassport ID
model_id: ""  # paste model passport ID here

creator:
  name: Forkit Team
  organization: ForkIt
  email: info@forkit.dev

capabilities:
  roles: [assistant]
  supports_tool_use: true
  supports_multi_turn: true
  supports_streaming: true
  languages: [en, ar]
  max_iterations: 10

temperature: 0.3
max_tokens: 2048
memory_type: vector_store
memory_config:
  provider: local-demo-store
  collection: public-docs-demo

tools:
  - name: knowledge_base_search
    version: 1.2.0
    description: Semantic search over public documentation
  - name: faq_lookup
    version: 1.0.0
    description: Retrieve answers from a public FAQ set
  - name: note_writer
    version: 1.1.0
    description: Draft structured support summaries for a human reviewer

deployment_env: demo

tags: [support, demo, multilingual]
status: active

metadata:
  team: oss-examples
  sla_tier: demo
